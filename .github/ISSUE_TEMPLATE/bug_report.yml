name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `nightmarenet train --config ...`
        2. Observe error at step ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: NightmareNet version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.5"

  - type: input
    id: gpu
    attributes:
      label: GPU (if applicable)
      placeholder: "RTX 3050 Ti 4GB / None (CPU)"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      render: shell
