name: Robustness Regression Check
on: [pull_request]

jobs:
  robustness-delta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Evaluate PR branch
        run: nightmarenet evaluate --model ./model --output pr-results.json --json
        # NOTE: If ./model doesn't exist, this step will fail in a real repo unless they have it.
        # This workflow follows the proposed solution format exactly.
        continue-on-error: true

      - name: Evaluate main branch
        run: |
          git checkout main
          nightmarenet evaluate --model ./model --output main-results.json --json || true
          git checkout -
        continue-on-error: true

      - name: Compute delta and post comment
        uses: ./.github/actions/robustness-delta-comment/
        with:
          pr_results: pr-results.json
          main_results: main-results.json
          threshold: -0.05
          metrics: "clean_accuracy,robustness_score,textfooler_0.5"
