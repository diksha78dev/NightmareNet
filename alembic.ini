# NightmareNet hosted-platform Alembic configuration.
#
# Alembic reads its script directory from ``script_location`` below and the
# database URL from ``sqlalchemy.url`` — both can be overridden at runtime via
# the ``NIGHTMARENET_DATABASE_URL`` environment variable (see env.py).

[alembic]
script_location = nightmarenet_server/db/migrations

prepend_sys_path = .

path_separator = os

sqlalchemy.url = sqlite:///./nightmarenet_hosted.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
