# NightmareNet benchmark: SST-2 sentiment (CPU-friendly, DistilBERT)
# Run: python scripts/train.py --config configs/benchmark_sst2.yaml
# Compare against: configs/benchmark_sst2_baseline.yaml (wake-only)

model:
  name: distilbert-base-uncased
  type: seq_classification
  max_length: 128
  num_labels: 2

dataset:
  name: glue
  config: sst2
  text_column: sentence
  label_column: label
  max_samples: 2000

training:
  wake_epochs: 2
  dream_epochs: 1
  nightmare_epochs: 1
  compress_epochs: 1
  num_cycles: 1
  batch_size: 8
  learning_rate: 3.0e-5
  device: cpu

distortion:
  dream_strength: 0.25
  nightmare_strength: 0.75

compression:
  pruning_ratio: 0.15
  distill_temperature: 2.0

evaluation:
  strengths: [0.1, 0.3, 0.5, 0.7, 0.9]
  seed: 42

tracking:
  enabled: false
