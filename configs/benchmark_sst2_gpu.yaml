# NightmareNet benchmark on RTX 3050 Ti (4 GB VRAM)
# 4-phase Wake -> Dream -> Nightmare -> Compress on SST-2 with DistilBERT
# Run: nightmarenet train --config configs/benchmark_sst2_gpu.yaml --device cuda
# Compare against: configs/benchmark_sst2_baseline_gpu.yaml (wake-only)

model:
  name: distilbert-base-uncased
  type: seq_classification
  max_length: 128
  num_labels: 2

dataset:
  name: glue
  config: sst2
  text_column: sentence
  label_column: label
  max_samples: 4000

training:
  wake_epochs: 2
  dream_epochs: 1
  nightmare_epochs: 1
  compress_epochs: 1
  num_cycles: 1
  batch_size: 16
  learning_rate: 3.0e-5
  device: cuda
  mixed_precision: fp16
  gradient_checkpointing: true

distortion:
  dream_strength: 0.25
  nightmare_strength: 0.75

compression:
  pruning_ratio: 0.15
  distill_temperature: 2.0

evaluation:
  strengths: [0.1, 0.3, 0.5, 0.7, 0.9]
  seed: 42

tracking:
  enabled: false
